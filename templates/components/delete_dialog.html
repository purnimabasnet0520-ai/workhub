<!-- Delete Confirmation Dialog -->
<div id="deleteDialog" class="fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm overflow-y-auto h-full w-full hidden z-50 flex items-center justify-center p-4">
  <div class="relative mx-auto border border-gray-200 w-full max-w-md shadow-2xl rounded-lg bg-white animate-fadeIn">
    <!-- Header -->
    <div class="px-6 pt-6 pb-4 border-b border-gray-100">
      <div class="flex items-start justify-between">
        <div class="flex items-center space-x-3">
          <div class="flex-shrink-0 w-10 h-10 rounded-full bg-red-100 flex items-center justify-center">
            <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
          </div>
          <h3 class="text-lg font-semibold text-gray-900" id="deleteDialogTitle">Delete Item</h3>
        </div>
        <button type="button" onclick="closeDeleteDialog()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="px-6 py-5">
      <p class="text-sm text-gray-600 leading-relaxed">
        Are you sure you want to <span id="actionText">delete</span> <strong class="font-semibold text-gray-900" id="deleteItemName">this item</strong>? This action cannot be undone.
      </p>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 bg-gray-50 rounded-b-lg flex items-center justify-end space-x-3">
      <form id="deleteForm" method="post" class="flex items-center space-x-3">
        {% csrf_token %}
        <button 
          type="button" 
          id="deleteCancelBtn" 
          class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-md shadow-sm hover:bg-gray-50 hover:border-gray-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-400 transition-all">
          Cancel
        </button>
        <button 
          type="submit" 
          class="px-5 py-2.5 bg-red-600 text-white text-sm font-medium rounded-md shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all">
          Delete
        </button>
      </form>
    </div>
  </div>
</div>

<style>
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.animate-fadeIn {
  animation: fadeIn 0.2s ease-out;
}

#deleteDialog:not(.hidden) {
  animation: fadeIn 0.15s ease-out;
}
</style>

<script>
function openDeleteDialog(title, itemname, postUrl, actionText = 'delete') {
  document.getElementById('deleteDialogTitle').textContent = title;
  document.getElementById('deleteItemName').textContent = itemname;
  document.getElementById('actionText').textContent = actionText;
  document.getElementById('deleteForm').action = postUrl;
  // Change button text based on action
  const submitBtn = document.querySelector('#deleteForm button[type="submit"]');
  submitBtn.textContent = actionText.charAt(0).toUpperCase() + actionText.slice(1);
  document.getElementById('deleteDialog').classList.remove('hidden');
  // Prevent body scroll when dialog is open
  document.body.style.overflow = 'hidden';
}

function closeDeleteDialog() {
  document.getElementById('deleteDialog').classList.add('hidden');
  // Restore body scroll
  document.body.style.overflow = '';
}

document.getElementById('deleteCancelBtn').addEventListener('click', closeDeleteDialog);

// Close dialog when clicking outside
document.getElementById('deleteDialog').addEventListener('click', function(event) {
  if (event.target === this) {
    closeDeleteDialog();
  }
});

// Close dialog on ESC key
document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape' && !document.getElementById('deleteDialog').classList.contains('hidden')) {
    closeDeleteDialog();
  }
});
</script>
