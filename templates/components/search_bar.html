<!-- Search Bar -->
<div class="flex bg-white border-2 rounded-xl border-cyan-100 overflow-hidden shadow-2xl max-w-3xl mx-auto">
    <input type="text" id="searchInput" placeholder="Type to search jobs, skills...." class="flex-1 px-5 py-2 text-gray-800 text-sm outline-none font-medium placeholder-gray-400" />
    <button onclick="performSearch()" class="bg-gradient-to-br from-cyan-500 via-cyan-600 to-cyan-700  hover:from-cyan-600 hover:via-cyan-700 hover:to-cyan-800 transition-all duration-300 text-white px-6 py-2  font-semibold text-sm flex items-center gap-2 whitespace-nowrap">
        <i class="fa-solid fa-magnifying-glass"></i> Search
    </button>
</div>

<script>
    function performSearch() {
        const searchInput = document.getElementById('searchInput');
        const searchValue = searchInput.value.trim();
        if (searchValue) {
            window.location.href = '/jobs/?search=' + encodeURIComponent(searchValue);
        }
    }

    // Allow pressing Enter key to search
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
</script>
